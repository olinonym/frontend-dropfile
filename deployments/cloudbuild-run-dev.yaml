steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: /bin/bash
    args:
      - -c
      - |
        docker run \
            --network=cloudbuild \
            -v /workspace:/workspace \
            gcr.io/kaniko-project/executor:latest \
            --dockerfile=/workspace/Dockerfile \
            --destination=$_GCR_HOSTNAME/$_PROJECT_ID/$_ARTIFACT_REGISTRY/$_SERVICE_NAME:latest \
            --cache=true \
            --cache-ttl=10h \
            --compressed-caching=false \
            --build-arg=VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY} \
            --build-arg=VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN} \
            --build-arg=VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID} \
            --build-arg=VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET} \
            --build-arg=VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID} \
            --build-arg=VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}

  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image
      - $_GCR_HOSTNAME/$_PROJECT_ID/$_ARTIFACT_REGISTRY/$_SERVICE_NAME:latest
      - --port=80
      - --region=$_DEPLOY_REGION
      - --platform=managed
      - --allow-unauthenticated

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _DEPLOY_REGION: asia-southeast3
  _SERVICE_NAME: front-end-dropping
  _GCR_HOSTNAME: asia-southeast3-docker.pkg.dev
  _ARTIFACT_REGISTRY: cds-app
  _PROJECT_ID: cds-dashboard-497009
  
