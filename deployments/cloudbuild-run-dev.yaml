  _VITE_FIREBASE_AUTH_DOMAIN: 'cds-dashboard-497009.firebaseapp.com'
  _VITE_FIREBASE_PROJECT_ID: 'cds-dashboard-497009'
  _VITE_FIREBASE_STORAGE_BUCKET: 'cds-data-pipeline'
