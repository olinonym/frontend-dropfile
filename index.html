<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chiang Mai CD Supply — File Upload</title>
  <link rel="icon" type="image/png" href="/logo-cds.png" />
  <link rel="stylesheet" href="src/style.css" />
</head>

<body>
  <div class="upload-container" id="login">
    <img class="brand-logo" src="/logo-cds.png" alt="Chiang Mai CD Supply" />
    <h2>Upload to Cloud</h2>
    <!-- <p>Sign in with your Firebase email to upload files securely.</p> -->

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="Enter your email" autocomplete="username" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password" />
    </div>

    <button id="loginBtn">Sign in</button>
    <div id="loginErr" class="message error" hidden></div>
  </div>

  <div class="upload-container" id="app" hidden>
    <img class="brand-logo brand-logo--small" src="/logo-cds.png" alt="Chiang Mai CD Supply" />
    <h2>Signed in as <span id="who"></span></h2>
    <p>Drop files below or click to choose from your device.</p>
    <button id="logoutBtn" class="secondary">Sign out</button>

    <div id="drop">Drop files here, or click to choose</div>
    <div id="readyStatus"></div>
    <div id="fileList"></div>
    <input id="picker" type="file" multiple hidden />
    <button id="uploadBtn">Upload files</button>
    <ul id="status"></ul>
    <a class="button-link secondary page-link" href="/files.html">View uploaded files</a>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
